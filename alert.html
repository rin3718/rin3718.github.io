<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全警告</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ff0000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .warning-container {
            max-width: 800px;
            padding: 30px;
            border: 5px solid white;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        .warning-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.5em;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .warning-list {
            text-align: left;
            font-size: 1.2em;
            margin: 20px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="warning-container">
        <div class="warning-icon">⚠️</div>
        <h1>高危安全警报</h1>
        <p>检测到严重安全威胁！</p>
        
        <div class="warning-list">
            <p>• 此网站已被标记为恶意来源</p>
            <p>• 您的设备可能已感染恶意软件</p>
            <p>• 个人信息存在泄露风险</p>
            <p>• 财务数据可能已被窃取</p>
        </div>
        
        <p>建议立即关闭此页面并运行安全扫描</p>
    </div>
</body>
</html>
