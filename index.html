<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 基础样式 */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
        }
        
        /* 导航栏样式 */
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
        }
        
        .container {
            width: 85%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 2rem;
        }
        
        nav ul li a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        nav ul li a:hover {
            color: #3498db;
        }
        
        /* 主要内容区 */
        .hero {
            background: #3498db;
            color: white;
            padding: 4rem 0;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 2rem;
        }
        
        .btn {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 0.7rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #1a252f;
        }
        
        /* 特色部分 */
        .features {
            padding: 4rem 0;
        }
        
        .features h2 {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .feature-card {
            background: #f9f9f9;
            padding: 2rem;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .feature-card h3 {
            color: #3498db;
        }
        
        /* 页脚 */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">我的网站</div>
                <ul>
                    <li><a href="#">首页</a></li>
                    <li><a href="#">关于我们</a></li>
                    <li><a href="#">服务</a></li>
                    <li><a href="#">产品</a></li>
                    <li><a href="#">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <!-- 主要内容区 -->
    <main>
        <!-- 英雄区域/横幅 -->
        <section class="hero">
            <div class="container">
                <h1>欢迎来到我的网站</h1>
                <p>我们提供专业的解决方案，帮助您的业务更上一层楼。创新、可靠、高效是我们的服务宗旨。</p>
                <a href="#" class="btn">了解更多</a>
            </div>
        </section>
        
        <!-- 特色部分 -->
        <section class="features">
            <div class="container">
                <h2>我们的特色</h2>
                <div class="feature-grid">
                    <div class="feature-card">
                        <h3>专业团队</h3>
                        <p>我们拥有经验丰富的专业团队，为您提供最优质的服务。</p>
                    </div>
                    <div class="feature-card">
                        <h3>创新技术</h3>
                        <p>采用最新技术，确保您的项目始终保持领先。</p>
                    </div>
                    <div class="feature-card">
                        <h3>客户至上</h3>
                        <p>我们始终将客户需求放在首位，提供个性化解决方案。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; </p>
            <p></p>
        </div>
    </footer>
</body>
</html>
