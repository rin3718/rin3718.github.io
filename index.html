            width: 100%;

            background-blend-mode: normal;
        }


        .download-container {
            text-align: center;

            font-family: inherit;
            text-align: center;
            background-image: none;
            background-blend-mode: normal;
            box-shadow: none;
   
        }

       
        .download-btn:hover {
            background-color: #2c5585; 
        }

        .download-btn:active {
            background-color: #1f4068; 
        }

            }

                font-size: 1.1rem;

        body::before,
        body::after,

</head>
